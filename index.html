<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff4500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="地狱锻炉">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>地狱锻炉 · HELL FORGE</title>
<style>
/* ═══════ 极简暗黑主题 ═══════ */
:root {
  --bg:#0a0000; --text:#ccc; --panel-bg:rgba(15,2,2,0.97);
  --border:#440000; --accent:#cc3300; --accent2:#ff0000;
  --btn-bg1:#440000; --btn-bg2:#220000;
  --input-bg:#080000; --card-bg:rgba(30,5,5,0.9);
  --hover-glow:rgba(255,0,0,0.4);
}
body.female {
  --bg:#2a1020; --text:#fff; --panel-bg:rgba(40,15,30,0.95);
  --border:#ff69b4; --accent:#ff85c0; --accent2:#ffb6d9;
  --btn-bg1:#cc3388; --btn-bg2:#991166;
  --input-bg:#1a0815; --card-bg:rgba(50,20,35,0.9);
  --hover-glow:rgba(255,105,180,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  /* 替代Canvas火焰 — 纯CSS渐变 */
  background-image:
    radial-gradient(ellipse at 50% 100%, rgba(200,10,0,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(180,0,0,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(150,0,0,0.05) 0%, transparent 50%);
  color: var(--text);
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height: 100vh; overflow-x: hidden;
}
body.female {
  background-image:
    radial-gradient(ellipse at 50% 100%, rgba(255,105,180,0.1) 0%, transparent 60%),
    radial-gradient(ellipse at 30% 80%, rgba(255,150,200,0.05) 0%, transparent 50%);
}

/* ── 主容器 ── */
.app { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:16px 10px; }

/* ── 头部装饰 ── */
.mega-icon {
  text-align:center; font-size: clamp(50px, 10vw, 80px);
  margin: 10px 0; opacity: 0.85;
}
.header { text-align:center; padding:10px 10px 5px; }
.header h1 {
  font-family: Georgia,'Times New Roman',serif;
  font-size: clamp(32px, 6vw, 48px);
  color: var(--accent);
  text-shadow: 0 0 30px var(--accent2);
  letter-spacing: 6px;
  animation: pulse 3s infinite alternate;
}
.header .sub {
  font-size: 1.2em; color: var(--accent);
  margin-top: 4px; letter-spacing: 8px;
}
@keyframes pulse {
  0% { text-shadow: 0 0 30px var(--accent2); }
  100% { text-shadow: 0 0 15px var(--accent2); }
}

/* ── 步骤指示器 ── */
.steps {
  display:flex; justify-content:center; gap: 40px; margin:10px 0 20px; position:relative;
}
.steps::before {
  content:''; position:absolute; top:20px; left:18%; right:18%; height:2px;
  background: var(--border);
}
.sw { text-align:center; position:relative; z-index:1; }
.sn {
  width:40px; height:40px; border-radius:50%;
  background:#0a0000; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-weight:bold; color:#550000; font-size:0.9em;
  margin:0 auto 4px; transition:all 0.3s;
}
.sn.active { background:var(--btn-bg1); border-color:var(--accent2); color:var(--accent); box-shadow:0 0 20px var(--hover-glow); }
.sn.done { background:#220000; border-color:#880000; color:var(--accent); }
.sl { font-size:0.75em; color:#660000; text-transform:uppercase; letter-spacing:2px; }

body.female .sn { border-color:#cc3388; background:#1a0815; color:#ff85c0; }
body.female .sn.active { background:#cc3388; border-color:#ff69b4; color:#fff; }
body.female .sn.done { background:#661155; border-color:#ff69b4; color:#ffb6d9; }
body.female .sl { color:#ff85c0; }

/* ── 面板 ── */
.panel {
  background: var(--panel-bg);
  border:1px solid var(--border);
  border-radius:6px; padding:24px 14px; margin:16px 0;
  box-shadow: 0 0 30px rgba(255,0,0,0.04);
  transition:all 0.3s;
}
.panel::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.panel h2 {
  font-size: 1.5em; color: var(--accent); margin-bottom:18px; text-align:center;
  text-shadow: 0 0 15px var(--accent); letter-spacing:4px; text-transform:uppercase;
}

body.female .panel { box-shadow:0 0 25px rgba(255,105,180,0.1); border-color:#ff69b4; }
body.female .panel::before { background:linear-gradient(90deg,transparent,#ff69b4,transparent); }

/* ── 性别选择 ── */
.gender-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; max-width:600px; margin:0 auto; }
.gender-card {
  background:var(--card-bg); border:2px solid var(--border);
  padding:30px 14px; text-align:center; cursor:pointer;
  transition:all 0.3s; font-size:1.1em;
}
.gender-card:hover { border-color:var(--accent2); box-shadow:0 0 25px var(--hover-glow); transform:translateY(-3px); }
.gender-card.selected { border-color:var(--accent2); box-shadow:0 0 40px var(--hover-glow); background:rgba(40,10,5,0.9); }
.gender-icon { font-size:3em; margin-bottom:10px; }
.gender-name { font-family:Georgia,serif; font-size:1.6em; color:var(--accent); letter-spacing:3px; }

/* ── 输入 ── */
.form-row { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; align-items:end; }
.field { display:flex; flex-direction:column; gap:4px; }
.field label { font-size:0.85em; color:var(--accent); text-transform:uppercase; letter-spacing:3px; }
.field input {
  background:var(--input-bg); border:2px solid var(--border); color:var(--accent2);
  padding:12px 16px; border-radius:5px; font-size:1.3em; width:140px;
  text-align:center; font-family:inherit;
}
.field input:focus { outline:none; border-color:var(--accent2); box-shadow:0 0 20px var(--hover-glow); }

/* ── 按钮 ── */
.btn {
  background: linear-gradient(180deg, var(--btn-bg1), var(--btn-bg2));
  border:1px solid var(--accent); color: var(--accent2);
  padding:14px 28px; border-radius:5px; font-size:1.1em;
  cursor:pointer; letter-spacing:3px; transition:all 0.3s; text-transform:uppercase;
}
.btn:hover { border-color:var(--accent2); color:#fff; box-shadow:0 0 25px var(--hover-glow); }
.btn--fire {
  background: linear-gradient(180deg, var(--accent), var(--btn-bg1));
  border-color: var(--accent2);
  animation: btnBurn 2.5s infinite;
}
@keyframes btnBurn {
  0%,100% { box-shadow: 0 0 10px var(--hover-glow); }
  50% { box-shadow: 0 0 30px var(--hover-glow); }
}

/* ── BMI ── */
.bmi-box { text-align:center; font-size:1.3em; margin-top:20px; padding:16px; border-radius:6px; background:rgba(10,0,0,0.4); border:1px solid var(--border); }
.bmi-num { font-size:2.5em; color:var(--accent2); font-weight:bold; }
.bmi-tag { color:var(--accent); margin-top:4px; letter-spacing:2px; font-size:0.85em; }

/* ── 体型卡片 ── */
.soma-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; margin:16px 0; }
.soma-card {
  background:var(--card-bg); border:2px solid var(--border);
  padding:22px; text-align:center; cursor:pointer; transition:all 0.3s;
}
.soma-card:hover { border-color:var(--accent2); box-shadow:0 0 25px var(--hover-glow); }
.soma-card.selected { border-color:var(--accent2); box-shadow:0 0 35px var(--hover-glow); background:rgba(40,10,5,0.9); }
.soma-icon { font-size:2.8em; margin-bottom:8px; }
.soma-name { font-family:Georgia,serif; font-size:1.3em; color:var(--accent); margin-bottom:8px; letter-spacing:2px; }
.soma-desc { font-size:0.9em; color:#887777; line-height:1.6; }
.soma-tag { display:inline-block; margin-top:8px; padding:3px 12px; background:#220000; font-size:0.8em; color:#cc6600; border:1px solid var(--border); }
.soma-rec { display:inline-block; margin-top:4px; padding:3px 12px; background:#330000; font-size:0.8em; color:var(--accent2); border:1px solid var(--accent); }

/* ── 计划卡片 ── */
.plan-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:14px; margin:16px 0; }
.plan-card {
  background:rgba(20,5,5,0.8); border:2px solid var(--border);
  padding:20px; cursor:pointer; transition:all 0.3s;
}
.plan-card:hover { border-color:var(--accent2); box-shadow:0 0 25px var(--hover-glow); }
.plan-card.active { border-color:var(--accent2); border-width:3px; background:rgba(40,10,5,0.9); box-shadow:0 0 35px var(--hover-glow); }
.plan-name { font-family:Georgia,serif; font-size:1.3em; color:var(--accent); margin-bottom:4px; letter-spacing:2px; }
.plan-sched { font-size:0.9em; color:#996666; }
.plan-note { margin-top:8px; font-size:0.85em; color:var(--accent); font-style:italic; }

/* ── 训练表格 ── */
.workout-section { margin-top:20px; }
.day-title {
  font-family:Georgia,serif; font-size:1.3em; color:var(--accent2);
  text-align:center; padding:14px; background:rgba(50,10,0,0.25);
  border:1px solid var(--border); margin-top:14px; letter-spacing:3px;
}
.workout-table { width:100%; border-collapse:collapse; font-size:0.95em; }
.workout-table th {
  background:linear-gradient(180deg, #330000, #1a0000);
  color:var(--accent); padding:10px; text-align:left;
  font-size:0.85em; letter-spacing:2px;
  border-bottom:1px solid var(--border); text-transform:uppercase;
}
.workout-table td { padding:10px; border-bottom:1px solid #220000; }
.workout-table tr:hover td { background:rgba(50,10,0,0.12); }
.workout-table tr.checked td { opacity:0.35; text-decoration:line-through; }
.workout-table tr.checked td:first-child { opacity:0.7; text-decoration:none; }
.check-cell { text-align:center; cursor:pointer; font-size:1.3em; user-select:none; width:44px; }
.check-cell.checked { color:var(--accent2); text-shadow:0 0 10px var(--accent2); }

.progress-bar { height:6px; background:#1a0000; margin:14px 0 4px; border:1px solid var(--border); }
.progress-fill {
  height:100%; background:linear-gradient(90deg, var(--btn-bg1), var(--accent), var(--accent2));
  transition:width 0.5s; box-shadow:0 0 10px var(--hover-glow);
}
.progress-txt { font-size:0.85em; color:#996666; text-align:right; letter-spacing:2px; }

/* ── 通用 ── */
.hidden { display:none !important; }
.nav-row { display:flex; justify-content:center; gap:16px; margin-top:20px; flex-wrap:wrap; }
.divider { text-align:center; font-size:1.5em; margin:25px 0 10px; color:var(--accent); letter-spacing:15px; }

@keyframes fadeInUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.animate-in { animation:fadeInUp 0.4s ease-out; }

/* ── 音乐播放器 ── */
.music-player { position:fixed; bottom:16px; right:16px; z-index:999; }
.music-toggle {
  width:48px; height:48px; border-radius:50%;
  background:linear-gradient(180deg,var(--btn-bg1),var(--btn-bg2));
  border:1px solid var(--accent); color:var(--accent2);
  font-size:1.3em; cursor:pointer; transition:all 0.3s;
  box-shadow:0 0 15px var(--hover-glow);
  display:flex; align-items:center; justify-content:center;
}
.music-toggle.playing {
  animation:btnBurn 2.5s infinite;
  background:linear-gradient(180deg,var(--accent),var(--btn-bg1));
}
.music-toggle.music-dead {
  opacity:0.4; animation:none;
  background:linear-gradient(180deg,var(--btn-bg2),#110000);
  border-color:#330000; color:#550000;
}

/* ── 离线横幅 ── */
.offline-banner {
  position:fixed; top:0; left:0; right:0; z-index:2000;
  background:linear-gradient(180deg, #990000, #440000);
  color:#fff; text-align:center; padding:8px;
  font-size:0.85em; letter-spacing:2px;
  transform:translateY(-100%); transition:transform 0.4s;
  box-shadow:0 0 30px rgba(255,0,0,0.5);
}
.offline-banner.show { transform:translateY(0); }

/* ── 帮助按钮 ── */
.help-btn {
  position:fixed; top:8px; left:8px; z-index:1000;
  width:32px; height:32px; border-radius:50%;
  background:rgba(15,2,2,0.85); border:1px solid var(--border);
  color:var(--accent); font-size:1em; font-weight:bold;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.3s;
}
.help-btn:hover { border-color:var(--accent2); box-shadow:0 0 15px var(--hover-glow); }
body.female .help-btn { background:rgba(40,15,30,0.85); border-color:#cc3388; color:#ff85c0; }

/* ── 指引弹窗 ── */
.guide-overlay {
  position:fixed; inset:0; z-index:3000;
  background:rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center;
  opacity:1; transition:opacity 0.3s;
}
.guide-overlay.hidden-guide { opacity:0; pointer-events:none; }
.guide-modal {
  background:var(--panel-bg); border:2px solid var(--accent);
  border-radius:10px; padding:30px 24px; max-width:380px; width:90%;
  box-shadow:0 0 60px var(--hover-glow);
  animation:fadeInUp 0.4s ease-out;
}
.guide-modal h3 {
  text-align:center; font-size:1.4em; color:var(--accent);
  margin-bottom:18px; letter-spacing:3px;
}
.guide-modal .guide-step {
  padding:8px 0; font-size:0.95em; color:var(--text);
  border-bottom:1px solid rgba(255,0,0,0.08); line-height:1.6;
}
.guide-modal .guide-step:last-of-type { border-bottom:none; }
.guide-modal .btn { display:block; margin:20px auto 0; }

body.female .guide-modal { border-color:#ff69b4; box-shadow:0 0 50px rgba(255,105,180,0.4); }

/* ── 手机适配 ── */
@media(max-width:500px) {
  .app { padding:8px 4px; }
  .gender-grid { grid-template-columns:1fr; }
  .panel { padding:18px 10px; margin:10px 0; }
  .field input { width:120px; font-size:1.2em; }
  .soma-grid,.plan-grid { grid-template-columns:1fr; }
  .panel h2 { font-size:1.3em; }
  .btn { padding:12px 20px; font-size:1em; }
  .steps { gap:28px; }
  .sn { width:34px; height:34px; font-size:0.8em; }
  .sl { font-size:0.65em; }
  .header h1 { font-size:clamp(26px,7vw,36px); }
}
</style>
</head>
<body>

<!-- 离线横幅 -->
<div class="offline-banner" id="offlineBanner">⚠️ 网络连接中断 — 离线模式</div>

<!-- 帮助按钮 -->
<button class="help-btn" id="helpBtn" onclick="showGuide()" title="使用指引">?</button>

<!-- 使用指引弹窗 -->
<div class="guide-overlay hidden-guide" id="guideOverlay" onclick="if(event.target===this)hideGuide()">
  <div class="guide-modal">
    <h3>💀 地狱锻炉 · 使用指引</h3>
    <div class="guide-step">🔥 <b>第一步：</b>选择性别（男/女主题切换）</div>
    <div class="guide-step">⚔️ <b>第二步：</b>输入身高体重，计算 BMI</div>
    <div class="guide-step">🗡️ <b>第三步：</b>选择你的体型血统</div>
    <div class="guide-step">☠️ <b>第四步：</b>挑选训练计划，开始锻体！</div>
    <div class="guide-step">✓ 点击动作旁的 ◯ 来打卡</div>
    <div class="guide-step">🎵 右下角按钮控制音乐</div>
    <div class="guide-step">📱 可添加到手机桌面当 App 用</div>
    <button class="btn btn--fire" onclick="hideGuide()">☠️ 懂了，开始锻体！</button>
  </div>
</div>

<div class="app">
  <!-- 装饰图标 -->
  <div class="mega-icon" id="megaIcon">💀</div>

  <div class="header animate-in">
    <h1>HELL FORGE</h1>
    <div class="sub">地狱锻炉</div>
  </div>

  <!-- 步骤 -->
  <div class="steps animate-in">
    <div class="sw"><div class="sn active" id="s0">⚥</div><div class="sl">性别</div></div>
    <div class="sw"><div class="sn" id="s1">I</div><div class="sl">测度</div></div>
    <div class="sw"><div class="sn" id="s2">II</div><div class="sl">血统</div></div>
    <div class="sw"><div class="sn" id="s3">III</div><div class="sl">试炼</div></div>
  </div>

  <!-- 步骤0: 性别 -->
  <div class="panel animate-in" id="genderPanel">
    <h2>选择性别</h2>
    <div class="gender-grid">
      <div class="gender-card selected" id="cardMale" onclick="pickGender('male')">
        <div class="gender-icon">💀</div>
        <div class="gender-name">MALE</div>
        <div style="margin-top:6px;color:#cc6666;font-size:0.85em">地狱烈焰 · 骷髅锻体</div>
      </div>
      <div class="gender-card" id="cardFemale" onclick="pickGender('female')">
        <div class="gender-icon">🦄</div>
        <div class="gender-name">FEMALE</div>
        <div style="margin-top:6px;color:#ff99cc;font-size:0.85em">小马宝莉 · 粉色健身</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn--fire" onclick="step1()">☠️ 继续</button>
    </div>
  </div>

  <!-- 步骤1: BMI -->
  <div class="panel hidden" id="bmiPanel">
    <h2>第一步 · 测度躯体</h2>
    <div class="form-row">
      <div class="field"><label>身高 CM</label><input type="number" id="height" placeholder="175" min="100" max="250"></div>
      <div class="field"><label>体重 KG</label><input type="number" id="weight" placeholder="70" min="30" max="300"></div>
      <button class="btn btn--fire" onclick="calcBMI()">☠️ 献祭计算</button>
    </div>
    <div class="bmi-box hidden" id="bmiResult"></div>
    <div class="nav-row">
      <button class="btn" onclick="step0()">◄ 重选性别</button>
      <button class="btn hidden" id="toSoma" onclick="step2()">➤ 选择血统</button>
    </div>
  </div>

  <!-- 步骤2: 体型 -->
  <div class="panel hidden" id="somaPanel">
    <h2>第二步 · 血统选择</h2>
    <div class="soma-grid" id="somaGrid"></div>
    <div class="nav-row">
      <button class="btn" onclick="step1()">◄ 返回</button>
      <button class="btn btn--fire" onclick="step3()">☠️ 进入试炼</button>
    </div>
  </div>

  <!-- 步骤3: 训练计划 -->
  <div class="panel hidden" id="planPanel">
    <h2 id="planTitle">试炼计划</h2>
    <div class="plan-grid" id="planGrid"></div>
    <div class="workout-section" id="workoutSection"></div>
    <div class="nav-row">
      <button class="btn" onclick="step0()">◄ 重选性别</button>
      <button class="btn" onclick="step2()">◄ 重选血统</button>
    </div>
  </div>

  <div class="divider">🔥 🔥 🔥</div>
</div>

<!-- 音乐播放器 -->
<div class="music-player" id="musicPlayer">
  <button class="music-toggle" id="musicBtn" onclick="toggleMusic()" title="体面DJ版">🎵</button>
  <audio id="musicAudio" src="https://music.163.com/song/media/outer/url?id=2735919359.mp3" loop preload="metadata"></audio>
</div>

<script>
// ═══════════════════════════ 数据库 ═══════════════════════════
const EX = {
  chest: [
    { n:'杠铃卧推' },{ n:'上斜哑铃卧推' },{ n:'哑铃飞鸟' },
    { n:'绳索夹胸' },{ n:'双杠臂屈伸' },{ n:'器械推胸' },
  ],
  back: [
    { n:'杠铃划船' },{ n:'引体向上' },{ n:'高位下拉' },
    { n:'哑铃单臂划船' },{ n:'坐姿绳索划船' },{ n:'硬拉' },
  ],
  shoulders: [
    { n:'杠铃推举' },{ n:'哑铃侧平举' },{ n:'哑铃前平举' },
    { n:'绳索面拉' },{ n:'反向飞鸟' },{ n:'阿诺德推举' },
  ],
  arms: [
    { n:'杠铃弯举' },{ n:'锤式弯举' },{ n:'牧师凳弯举' },
    { n:'绳索下压' },{ n:'窄距卧推' },{ n:'过头臂屈伸' },
  ],
  forearms: [

// ═══════════════════════════ 体型 ═══════════════════════════
const SOMAS = [
  { id:'ecto', icon:'🧍', name:'外胚型 · ECTOMORPH', desc:'瘦长骨架，代谢如焚，增肌艰难。需大重量、高热量、充足睡眠。', bmi:'< 18.5' },
  { id:'meso', icon:'🗿', name:'中胚型 · MESOMORPH', desc:'战争机器体质——宽肩窄腰，增肌减脂皆易。适合所有训练方案。', bmi:'18.5–24.9' },
  { id:'endo', icon:'🦍', name:'内胚型 · ENDOMORPH', desc:'重装体型，骨架粗大，力量潜力极高但易堆积脂肪。需力量+有氧双修。', bmi:'≥ 25' },
];

// ═══════════════════════════ 状态 ═══════════════════════════
let S = { gender:'male', step:0, bmi:null, soma:null, plan:null };

function recSoma(bmi){ return bmi<18.5?'ecto':bmi<25?'meso':'endo'; }

function upSteps(){
  ['s0','s1','s2','s3'].forEach((id,i)=>{
    const e=document.getElementById(id);
    e.classList.remove('active','done');
    if(i===S.step) e.classList.add('active');
    else if(i<S.step) e.classList.add('done');
  });
}

function pickGender(g){
  S.gender=g;
  document.getElementById('cardMale').classList.toggle('selected',g==='male');
  document.getElementById('cardFemale').classList.toggle('selected',g==='female');
  document.body.classList.toggle('female',g==='female');
  document.getElementById('megaIcon').textContent = g==='female' ? '🦄' : '💀';
}

document.addEventListener('DOMContentLoaded',()=> pickGender('male'));

// ═══════════════════════════ localStorage ═══════════════════════════
const STORAGE_KEY = 'hell_forge_checks';
function loadChecks(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch{return{};} }
function saveChecks(c){ localStorage.setItem(STORAGE_KEY,JSON.stringify(c)); }
function ckKey(pn,di,ei){ return `${pn}__${di}__${ei}`; }
function toggleCheck(pn,di,ei){
  const c=loadChecks(); const k=ckKey(pn,di,ei); c[k]=!c[k]; saveChecks(c);
  renderDetail(S.plan);
}
function resetChecks(){ localStorage.removeItem(STORAGE_KEY); if(S.plan) renderDetail(S.plan); }

// ═══════════════════════════ BMI ═══════════════════════════
function calcBMI(){
  const h=parseFloat(document.getElementById('height').value)/100;
  const w=parseFloat(document.getElementById('weight').value);
  if(!h||!w||h<=0||w<=0) return alert('☠️ 输入有效数字！');
  S.bmi=w/(h*h);
  let lb,cl;
  if(S.bmi<18.5){lb='偏瘦 · 外胚血统';cl='#ff4400';}
  else if(S.bmi<25){lb='标准 · 中胚血统';cl='#ff0000';}
  else if(S.bmi<30){lb='偏重 · 内胚血统';cl='#cc0000';}
  else {lb='沉重 · 纯粹内胚';cl='#990000';}
  document.getElementById('bmiResult').classList.remove('hidden');
  document.getElementById('bmiResult').innerHTML=`<div class="bmi-num" style="color:${cl}">${S.bmi.toFixed(1)}</div><div class="bmi-tag">${lb}</div>`;
  document.getElementById('toSoma').classList.remove('hidden');
}

// ═══════════════════════════ 步骤切换 ═══════════════════════════
function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.classList.add('animate-in');
  el.scrollIntoView({behavior:'smooth',block:'start'});
}
function step0(){ S.step=0; S.bmi=null; S.soma=null; S.plan=null; upSteps(); showPanel('genderPanel'); }
function step1(){ S.step=1; S.soma=null; S.plan=null; upSteps(); showPanel('bmiPanel'); }
function step2(){
  S.step=2; S.plan=null; upSteps();
  if(!S.soma&&S.bmi) S.soma=recSoma(S.bmi);
  showPanel('somaPanel'); renderSomas();
}
function step3(){
  if(!S.soma) return alert('☠️ 选择血统！');
  S.step=3; upSteps(); showPanel('planPanel'); renderPlans();
}

// ═══════════════════════════ 渲染 ═══════════════════════════
function renderSomas(){
  const rec=S.bmi?recSoma(S.bmi):null;
  document.getElementById('somaGrid').innerHTML=SOMAS.map(s=>`
    <div class="soma-card${S.soma===s.id?' selected':''}" onclick="S.soma='${s.id}';renderSomas();">
      <div class="soma-icon">${s.icon}</div>
      <div class="soma-name">${s.name}</div>
      <div class="soma-desc">${s.desc}</div>
      <div class="soma-tag">BMI ${s.bmi}</div>
      ${rec===s.id?'<div class="soma-rec">☠️ BMI推荐</div>':''}
    </div>
  `).join('');
}

function renderPlans(){
  const bmi=S.bmi||22;
  const soma=SOMAS.find(s=>s.id===S.soma);
  document.getElementById('planTitle').innerHTML=`${soma.icon} ${soma.name} · 试炼`;

  const plans=[plan3(bmi),plan4(bmi),plan5(bmi),planCbum(bmi)];
  window._plans = plans;
  document.getElementById('planGrid').innerHTML=plans.map((p,i)=>`
    <div class="plan-card${S.plan&&S.plan.name===p.name?' active':''}" onclick="S.plan=window._plans[${i}];renderPlans();">
      <div class="plan-name">${p.name}</div>
      <div class="plan-sched">${p.sched}</div>
      <div class="plan-note">${p.note}</div>
    </div>
  `).join('');

  if(S.plan) renderDetail(S.plan);
  else document.getElementById('workoutSection').innerHTML='<div style="text-align:center;padding:40px;color:#887777;font-size:1.2em">👆 点击上方选择一个训练计划</div>';
}

function renderDetail(plan){
  const checks=loadChecks(), container=document.getElementById('workoutSection');
  let total=0, done=0;
  plan.days.forEach((day,di)=>{
    day.ex.forEach((_,ei)=>{ total++;
      if(checks[ckKey(plan.name,di,ei)]) done++;
    });
  });

  let html=`<div class="progress-bar"><div class="progress-fill" style="width:${total?done/total*100:0}%"></div></div>
    <div class="progress-txt">☠️ ${done}/${total} · ${total?Math.round(done/total*100):0}%</div>
    <button class="btn" style="margin-top:8px;font-size:0.85em;padding:8px 16px" onclick="resetChecks()">☠️ 重置打卡</button>`;

  plan.days.forEach((day,di)=>{
    html+=`<div class="day-title">${day.name}</div><table class="workout-table">
      <tr><th>✓</th><th>动作</th><th>组数</th><th>次数</th><th>休息</th></tr>`;
    day.ex.forEach((ex,ei)=>{
      const key=ckKey(plan.name,di,ei), chk=checks[key];
      html+=`<tr class="${chk?'checked':''}">
        <td class="check-cell${chk?' checked':''}" onclick="toggleCheck('${plan.name}',${di},${ei})">${chk?'☠️':'◯'}</td>
        <td>${ex.n}</td><td>${ex.s}</td><td>${ex.r}</td><td>${ex.rest}</td></tr>`;
    });
    html+='</table>';
  });
  container.innerHTML=html;
}

renderSomas();

// ═══════════════════════════ 音乐自动播放（健壮版） ═══════════════════════════
const musicAudio = document.getElementById('musicAudio');
const musicBtn = document.getElementById('musicBtn');
let musicOn = false, musicFailed = false, musicTimer = null;

function killMusicTimer() { if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; } }

function startMusic() {
  if (musicOn || musicFailed) return;
  musicAudio.volume = 0.6;
  // 5秒超时：手机网络慢时不给无限缓冲时间
  musicTimer = setTimeout(() => {
    if (!musicOn) {
      musicFailed = true;
      musicBtn.classList.add('music-dead');
      musicBtn.textContent = '🔇';
      musicBtn.title = '音乐加载超时，点击重试';
      musicAudio.pause();
    }
  }, 5000);
  musicAudio.play().then(() => {
    killMusicTimer();
    musicOn = true;
    musicBtn.classList.add('playing');
    musicBtn.classList.remove('music-dead');
    musicBtn.textContent = '🎵';
  }).catch(() => {
    killMusicTimer();
    musicFailed = true;
    musicBtn.classList.add('music-dead');
    musicBtn.textContent = '🔇';
    musicBtn.title = '音乐无法播放，点击重试';
  });
}

// 音乐加载失败时静默降级
musicAudio.addEventListener('error', () => {
  killMusicTimer();
  if (!musicOn) {
    musicFailed = true;
    musicBtn.classList.add('music-dead');
    musicBtn.textContent = '🔇';
    musicBtn.title = '音乐加载失败，点击重试';
  }
});

// 页面加载立即尝试播放
window.addEventListener('DOMContentLoaded', startMusic);

// 首次用户交互时兜底播放（移动端必需）
['click','touchstart'].forEach(evt => {
  document.addEventListener(evt, startMusic, { once: false });
});

function toggleMusic() {
  if (musicOn) {
    musicAudio.pause();
    musicOn = false;
    musicBtn.classList.remove('playing');
  } else {
    musicFailed = false;
    musicBtn.classList.remove('music-dead');
    musicBtn.textContent = '🎵';
    startMusic();
  }
}
// ═══════════════════════════ 指引弹窗 ═══════════════════════════
function showGuide() {
  document.getElementById('guideOverlay').classList.remove('hidden-guide');
}
function hideGuide() {
  document.getElementById('guideOverlay').classList.add('hidden-guide');
  try { localStorage.setItem('hell_forge_seen_guide', '1'); } catch(e) {}
}
// 首次访问自动弹出指引
(function(){
  try {
    if (!localStorage.getItem('hell_forge_seen_guide')) {
      setTimeout(showGuide, 600);
    }
  } catch(e) {}
})();

// ═══════════════════════════ 离线检测 ═══════════════════════════
(function(){
  const banner = document.getElementById('offlineBanner');
  function updateOnline() {
    if (navigator.onLine) {
      banner.classList.remove('show');
    } else {
      banner.classList.add('show');
    }
  }
  updateOnline();
  window.addEventListener('online', updateOnline);
  window.addEventListener('offline', updateOnline);
})();
</script>

if ('serviceWorker' in navigator) {
